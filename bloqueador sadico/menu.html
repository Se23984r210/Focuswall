<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #0a0a0c;
      --card: #121418;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --red: #ff1a1a;
      --border: #1f2229;
      --input-bg: #090a0c;
    }
    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: repeating-linear-gradient(transparent, transparent 2px, rgba(0,0,0,0.4) 3px);
      pointer-events: none; z-index: 999;
    }
    body {
      font-family: 'Courier New', Courier, monospace;
      width: 340px; padding: 20px; background-color: var(--bg); color: var(--text); margin: 0;
      position: relative;
    }
    h3, h4 { margin: 0 0 15px 0; font-weight: bold; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
    
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 15px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    
    .stats-title { font-size: 10px; color: var(--red); font-weight: bold; letter-spacing: 2px; text-align: center; }
    .stats-number { font-size: 48px; font-weight: 900; color: #fff; text-align: center; text-shadow: 0 0 20px rgba(255, 26, 26, 0.8); margin: 0; line-height: 1.2; }
    .insulto-dinamico { font-size: 11px; color: var(--text-muted); text-align: center; font-weight: bold; text-transform: uppercase; min-height: 15px; margin-top: 5px;}

    .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
    input[type="text"], input[type="time"] {
      flex-grow: 1; padding: 10px; border: 1px solid var(--border);
      background: var(--input-bg); color: var(--text); border-radius: 2px; font-size: 13px; outline: none; font-family: inherit;
    }
    input:focus { border-color: var(--red); box-shadow: 0 0 5px rgba(255, 26, 26, 0.3); }
    
    button { font-weight: bold; cursor: pointer; border: none; border-radius: 2px; padding: 10px 15px; font-size: 12px; font-family: inherit; text-transform: uppercase; letter-spacing: 1px;}
    button.primary { background: #fff; color: #000; }
    button.primary:hover { background: #ccc; }
    
    button.danger { 
      background: repeating-linear-gradient(45deg, #450a0a, #450a0a 10px, #7f1d1d 10px, #7f1d1d 20px);
      color: #fff; border: 1px solid var(--red); text-shadow: 1px 1px 2px black;
    }
    button.danger:hover { filter: brightness(1.3); }

    ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; }
    li { background: var(--input-bg); border: 1px solid var(--border); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .delete-btn { background: transparent; color: var(--red); padding: 2px 6px; font-size: 14px; }
    .delete-btn:hover { background: var(--red); color: #fff; }

    .time-group { display: flex; gap: 10px; margin-bottom: 15px; }
    .time-col { display: flex; flex-direction: column; gap: 5px; width: 100%; }
    .time-label { font-size: 10px; color: var(--text-muted); }
    #msgHorario { color: #10b981; font-size: 11px; text-align: center; display: none; margin-top: 10px; text-transform: uppercase; }

    .antimafia-container { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .antimafia-label { font-size: 10px; color: var(--red); font-weight: bold; text-align: center; }
  </style>
</head>
<body>
  <div class="card" style="border-color: #330000; background: linear-gradient(180deg, #121418 0%, #1a0505 100%);">
    <div class="stats-title">SISTEMA COMPROMETIDO</div>
    <div id="contadorFallos" class="stats-number">0</div>
    <div id="insultoTexto" class="insulto-dinamico">Analizando disciplina...</div>
  </div>

  <h3>Lista Negra</h3>
  <div class="input-group">
    <input type="text" id="nuevaWeb" placeholder="EJ. REDDIT.COM" autocomplete="off">
    <button class="primary" id="agregarBtn">Bloquear</button>
  </div>
  <ul id="listaWebs"></ul>

  <div class="card" style="margin-bottom: 0;">
    <h4>Confinamiento</h4>
    <div class="time-group">
      <div class="time-col">
        <span class="time-label">INICIO</span>
        <input type="time" id="horaInicio">
      </div>
      <div class="time-col">
        <span class="time-label">FIN</span>
        <input type="time" id="horaFin">
      </div>
    </div>
    <button id="btnHorario" class="danger" style="width: 100%;">Imponer Castigo</button>
    <p id="msgHorario">SISTEMA ARMADO</p>
  </div>

  <script src="menu.js"></script>
</body>
</html>
